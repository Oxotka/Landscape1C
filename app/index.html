<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ландшафт технологий 1С</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
  <header class="masthead">
    <div class="masthead__main">
      <p class="kicker">Интерактивная карта · стек 1С</p>
      <h1 class="title">Ландшафт технологий 1С</h1>
      <p class="lede">Не просто список, а навигация: фильтруй по&nbsp;<b>роли</b> и&nbsp;<b>контексту работы</b>, смотри зрелость и&nbsp;происхождение каждого инструмента.</p>
      <div class="search">
        <input id="search" type="search" placeholder="Поиск инструмента…" autocomplete="off" spellcheck="false">
      </div>
    </div>
    <!-- Декоративный счётчик. Статичный: app.js обновляет только #count в строке ниже. -->
    <div class="masthead__num" aria-hidden="true">63</div>
  </header>

  <section class="kits" aria-label="Стартовые наборы по контексту">
    <span class="kits__label">Старт</span>
    <div id="kits" class="kits__row"></div>
  </section>

  <div class="body">
    <aside class="filters" id="filters" aria-label="Фильтры"></aside>

    <main class="content">
      <div class="content__bar">
        <span id="count" class="count"></span>
        <button id="reset" class="reset" hidden>Сбросить ✕</button>
      </div>
      <div id="board" class="board"></div>
      <p id="empty" class="empty" hidden>Под выбранные фильтры ничего не подошло.</p>
    </main>
  </div>

  <footer class="foot">
    <span>Прототип · Вариант B</span>
    <span>Данные — из каталога <a href="https://github.com/Oxotka/StackTechnologies1C">StackTechnologies1C</a></span>
  </footer>

  <dialog id="detail" class="detail">
    <div class="detail__body"></div>
  </dialog>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
