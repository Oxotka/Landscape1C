# Публикация фронтенда на GitHub Pages.
#
# СЕЙЧАС НЕАКТИВЕН: запускается только вручную (workflow_dispatch).
# Чтобы включить автодеплой после открытия репозитория:
#   1. Сделать репозиторий публичным.
#   2. Settings → Pages → Source: GitHub Actions.
#   3. Раскомментировать блок push ниже (деплой на каждый push в main).
name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  # push:
  #   branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Публикуем dist/: build.js прогоняет валидатор данных и копирует статику
  # из app/, выкидывая редактор (editor.*) и .DS_Store.
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build dist (validate + copy without editor)
        run: node scripts/build.js
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
