# Проверка данных на pull request: валидатор ловит рассинхрон осей, блоков,
# файлов логотипов и связей (как пропавший curlone.svg) до влития в main.
name: Validate data

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate data (axes, blocks, logos, links)
        run: node scripts/validate.js
